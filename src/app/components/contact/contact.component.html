<!-- Page Header -->

<div class="container-fluid p-0">
  <div class="page-header pb-5">
    <div class="container text-center py-5">
      <h1 class="display-4 text-uppercase mb-3 animate__animated animate__slideInDown">
        Contact
      </h1>

      <nav aria-label="breadcrumb" class="animate__animated animate__slideInDown">
        <ol class="breadcrumb justify-content-center text-uppercase mb-0">
          <li class="breadcrumb-item">
            <a class="text-white" routerLink="/">Home</a>
          </li>
          <li class="breadcrumb-item">
            <a class="text-white" href="#">Pages</a>
          </li>
          <li class="breadcrumb-item text-primary active" aria-current="page">
            Contact
          </li>
        </ol>
      </nav>

    </div>
  </div>
</div>

<!-- Contact Content -->

<div class="container-fluid py-5">
  <div class="container py-5">
    <div class="row g-5">
      <!-- Contact Info -->
      <div class="col-lg-6">

        <div class="title wow animate__animated animate__fadeInUp" data-wow-delay="0.1s">
          <div class="title-left">
            <h5>Contact</h5>
            <h1>Please Contact Us</h1>
          </div>
        </div>

        <h4 class="lh-base mb-4 wow animate__animated animate__fadeInUp" data-wow-delay="0.1s">
          We'd love to hear from you. Send us a message and we'll respond as soon as possible.
        </h4>

        <table class="table table-dark mb-0 wow animate__animated animate__fadeInUp" data-wow-delay="0.3s">
          <tr>
            <td>PHONE</td>
            <td>+0123456789</td>
          </tr>
          <tr>
            <td>E-MAIL</td>
            <td>info&#64;example.com</td>
          </tr>
          <tr>
            <td>ADDRESS</td>
            <td>123 Street, New York, USA</td>
          </tr>
          <tr class="border-dark">
            <td>FOLLOW US</td>
            <td>
              <a class="me-1" href="#"><i class="fab fa-x-twitter"></i></a>
              <a class="me-1" href="#"><i class="fab fa-facebook-f"></i></a>
              <a class="me-1" href="#"><i class="fab fa-youtube"></i></a>
              <a class="me-1" href="#"><i class="fab fa-linkedin-in"></i></a>
            </td>
          </tr>
        </table>

      </div>


      <!-- Contact Form -->
      <div class="col-lg-6 wow animate__animated animate__fadeInUp" data-wow-delay="0.5s">

        <div *ngIf="submitted" class="alert alert-success">
          ✅ Message sent successfully! We'll get back to you soon.
        </div>

        <div class="row g-3">

          <div class="col-md-6">
            <div class="form-floating">
              <input type="text" class="form-control bg-secondary border-0" id="name" placeholder="Your Name"
                [(ngModel)]="formData.name">
              <label for="name">Your Name</label>
            </div>
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <input type="email" class="form-control bg-secondary border-0" id="email" placeholder="Your Email"
                [(ngModel)]="formData.email">
              <label for="email">Your Email</label>
            </div>
          </div>

          <div class="col-12">
            <div class="form-floating">
              <input type="text" class="form-control bg-secondary border-0" id="subject" placeholder="Subject"
                [(ngModel)]="formData.subject">
              <label for="subject">Subject</label>
            </div>
          </div>

          <div class="col-12">
            <div class="form-floating">
              <textarea class="form-control bg-secondary border-0" id="message" style="height:150px"
                placeholder="Leave a message" [(ngModel)]="formData.message"></textarea>
              <label for="message">Message</label>
            </div>
          </div>

          <div class="col-12">
            <button class="btn btn-outline-primary border-2 w-100 py-3" type="button" (click)="onSubmit()">
              Send Message
            </button>
          </div>

        </div>

      </div>

    </div>
  </div>
</div>

<!-- Google Map -->

<div class="container-fluid p-0 wow animate__animated animate__fadeIn" data-wow-delay="0.3s">

  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3001156.4288297426!2d-78.01371936852176!3d42.72876761954724!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4ccc4bf0f123a5a9%3A0xddcfc6c1de189567!2sNew%20York%2C%20USA!5e0!3m2!1sen!2sbd!4v1603794290143!5m2!1sen!2sbd"
    frameborder="0" allowfullscreen
    style="width:100%; height:500px; filter:grayscale(100%) invert(92%) contrast(83%); border:0;">
  </iframe>

</div>
